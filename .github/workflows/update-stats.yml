---
name: Update Profile Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repo
        uses: actions/checkout@v4

      - name: Fetch plugin count from ansible-pm-ai
        id: plugins
        run: |
          COUNT=$(curl -s https://api.github.com/repos/ansible/ansible-pm-ai/contents/plugins \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Plugin count: ${COUNT}"

      - name: Update README badge and table
        run: |
          COUNT="${{ steps.plugins.outputs.count }}"

          sed -i "s|<!-- PLUGIN_COUNT_BADGE -->.*<!-- /PLUGIN_COUNT_BADGE -->|<!-- PLUGIN_COUNT_BADGE --><img src=\"https://img.shields.io/badge/AI_PM_Toolkit-${COUNT}_Plugins_Built-ef4444?style=for-the-badge\&labelColor=0d1117\"/><!-- /PLUGIN_COUNT_BADGE -->|" README.md

          sed -i "s#<!-- PLUGIN_COUNT_TABLE -->.*<!-- /PLUGIN_COUNT_TABLE -->#<!-- PLUGIN_COUNT_TABLE -->| 🤖 **AI PM Toolkit** | Created ${COUNT}-plugin framework for PM workflows (ansible-pm-ai) |<!-- /PLUGIN_COUNT_TABLE -->#" README.md

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update plugin count to ${{ steps.plugins.outputs.count }}"
          git push
